<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YAO YAXI</title>

<style>
body{
  margin:0;
  background:#06070c;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont;
}

/* ===== 主视觉 ===== */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.03);
}

/* 遮罩 */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(120deg,rgba(0,0,0,.55),rgba(0,0,0,.1)),
    linear-gradient(to top,rgba(0,0,0,.6),transparent);
}

/* 粒子 */
.particles{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,215,120,0.2), transparent 40px),
    radial-gradient(circle at 70% 60%, rgba(255,215,120,0.15), transparent 60px);
  animation:move 16s linear infinite;
}

@keyframes move{
  50%{transform:translateY(-20px);}
}

/* 标题 */
.hero-text{
  position:absolute;
  bottom:120px;
  left:40px;
}

.hero-text h1{
  font-size:64px;
  line-height:1;
}

/* ===== 作品 ===== */
.section{
  padding:80px 40px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.card{
  border:1px solid rgba(255,255,255,.1);
  padding:20px;
  background:rgba(255,255,255,.03);
}

.poster{
  position:relative;
  height:260px;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.poster::after{
  content:"▶";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  opacity:.8;
}

/* ===== 弹窗 ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal iframe{
  width:80%;
  height:80%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 主视觉 -->
<section class="hero">
  <img src="./poster-main.png">
  <div class="particles"></div>

  <div class="hero-text">
    <h1>让作品成为<br>项目的一部分</h1>
  </div>
</section>

<!-- 作品 -->
<section class="section">
  <div class="grid">

    <div class="card">
      <div class="poster" onclick="play(0)">
        <img src="./poster1.png">
      </div>
      <h3>贵女重生</h3>
    </div>

    <div class="card">
      <div class="poster" onclick="play(1)">
        <img src="./poster2.png">
      </div>
      <h3>诡秘之猫</h3>
    </div>

    <div class="card">
      <div class="poster" onclick="play(2)">
        <img src="./poster3.png">
      </div>
      <h3>北纬30°</h3>
    </div>

    <div class="card">
      <div class="poster" onclick="play(3)">
        <img src="./poster4.png">
      </div>
      <h3>再见，明</h3>
    </div>

  </div>
</section>

<!-- 弹窗 -->
<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✕</div>
  <iframe id="video"></iframe>
</div>

<script>
const urls = [
"https://player.bilibili.com/player.html?bvid=BV1xjSZBhEPJ",
"https://player.bilibili.com/player.html?bvid=BV14GSZBPEBV",
"https://player.bilibili.com/player.html?bvid=BV1yJSZBbEFi",
"https://player.bilibili.com/player.html?bvid=BV1pnSZBZECU"
];

function play(i){
  document.getElementById('modal').style.display='flex';
  document.getElementById('video').src=urls[i];
}

function closeModal(){
  document.getElementById('modal').style.display='none';
  document.getElementById('video').src='';
}
</script>

</body>
</html>
